version: '3.8'

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: ./docker/airflow/Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: 'EcomFernetKeyMustBe32BytesLong12345='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    # AWS Credentials for S3 operations
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-mock_key}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-mock_secret}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  volumes:
    - ./src/airflow_dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./plugins:/opt/airflow/plugins
  user: "50000:0"
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  # ─── DATABASE WAREHOUSE ──────────────────────────────────────────────
  # The target analytical database for the Star Schema & aggregations
  postgres-warehouse:
    image: postgres:15-alpine
    container_name: postgres-warehouse
    environment:
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_password
      POSTGRES_DB: ecom_warehouse
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-warehouse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_user -d ecom_warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── KAFKA STREAMING ECOSYSTEM ──────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.9.1
    container_name: zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/bitnami/zookeeper

  kafka-broker:
    image: bitnami/kafka:3.7.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-broker:9092
    volumes:
      - kafka-data:/bitnami/kafka
    depends_on:
      - zookeeper

  # ─── APACHE SPARK CLUSTER ───────────────────────────────────────────
  spark-master:
    build:
      context: .
      dockerfile: ./docker/spark/Dockerfile
    container_name: spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080" # Spark Master Web UI
    environment:
      - SPARK_MODE=master
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock_key}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock_secret}
    volumes:
      - ./src/spark_jobs:/opt/bitnami/spark/spark_jobs
      - ./data:/opt/bitnami/spark/data

  spark-worker:
    build:
      context: .
      dockerfile: ./docker/spark/Dockerfile
    container_name: spark-worker
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081" # Spark Worker Web UI
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2G
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock_key}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock_secret}
    volumes:
      - ./src/spark_jobs:/opt/bitnami/spark/spark_jobs
      - ./data:/opt/bitnami/spark/data
    depends_on:
      - spark-master

  # ─── APACHE AIRFLOW SYSTEM ──────────────────────────────────────────
  airflow-postgres:
    image: postgres:13-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432" # Uses 5433 to avoid host port conflict with the warehouse
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8082:8080" # Maps to 8082 on the host since Spark Master uses 8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "50000:0" /sources/{logs,dags,plugins}
        exec /entrypoint airflow db migrate && \
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password admin
    environment:
      <<: *airflow-common-env
    user: "0:0"
    volumes:
      - .:/sources

  # ─── REAL-TIME ORDER PRODUCER ───────────────────────────────────────
  order-producer:
    build:
      context: .
      dockerfile: ./docker/producer/Dockerfile
    container_name: order-producer
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:9092
    volumes:
      - ./src/producers:/app/producers
      - ./src/utils:/app/utils
      - ./data:/app/data
    depends_on:
      - kafka-broker
    profiles:
      - tools # This profile makes it optional, so it only runs when explicitly called

volumes:
  postgres-warehouse-data:
  zookeeper-data:
  kafka-data:
  airflow-postgres-data:
