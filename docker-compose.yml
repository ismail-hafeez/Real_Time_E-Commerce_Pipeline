
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: ./docker/airflow/Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: 'EcomFernetKeyMustBe32BytesLong12345='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    # AWS Credentials for S3 operations
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-mock_key}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-mock_secret}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    
    # DB Warehouse Credentials for Spark & Airflow
    DB_WAREHOUSE_HOST: ${DB_WAREHOUSE_HOST:-postgres-warehouse}
    DB_WAREHOUSE_PORT: ${DB_WAREHOUSE_PORT:-5432}
    DB_WAREHOUSE_NAME: ${DB_WAREHOUSE_NAME:-ecom_warehouse}
    DB_WAREHOUSE_USER: ${DB_WAREHOUSE_USER:-warehouse_user}
    DB_WAREHOUSE_PASSWORD: ${DB_WAREHOUSE_PASSWORD:-warehouse_password}

    # Auto-create the Spark Connection in Airflow
    AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "spark://spark-master", "port": 7077}'
  volumes:
    - ./src/airflow_dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./plugins:/opt/airflow/plugins
    - ./src/spark_jobs:/opt/airflow/spark_jobs
    - ./data:/opt/airflow/data
  user: "50000:0"
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  # ─── DATABASE WAREHOUSE ──────────────────────────────────────────────
  # The target analytical database for the Star Schema & aggregations
  postgres-warehouse:
    image: postgres:15-alpine
    container_name: postgres-warehouse
    environment:
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_password
      POSTGRES_DB: ecom_warehouse
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-warehouse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_user -d ecom_warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── KAFKA STREAMING ECOSYSTEM ──────────────────────────────────────
  # Uses the official Apache Kafka image with KRaft mode (no Zookeeper needed)
  kafka-broker:
    image: apache/kafka:3.9.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      # KRaft mode configuration (replaces Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listener configuration
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Cluster ID
      CLUSTER_ID: ecom-pipeline-kafka-cluster-01
      # Single-node replica configurations (crucial to allow __consumer_offsets auto-creation)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ─── APACHE SPARK CLUSTER ───────────────────────────────────────────
  spark-master:
    build:
      context: .
      dockerfile: ./docker/spark/Dockerfile
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080" # Spark Master Web UI
    environment:
      - SPARK_MODE=master
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock_key}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock_secret}
      - DB_WAREHOUSE_HOST=${DB_WAREHOUSE_HOST:-postgres-warehouse}
      - DB_WAREHOUSE_PORT=${DB_WAREHOUSE_PORT:-5432}
      - DB_WAREHOUSE_NAME=${DB_WAREHOUSE_NAME:-ecom_warehouse}
      - DB_WAREHOUSE_USER=${DB_WAREHOUSE_USER:-warehouse_user}
      - DB_WAREHOUSE_PASSWORD=${DB_WAREHOUSE_PASSWORD:-warehouse_password}
    volumes:
      - ./src/spark_jobs:/opt/spark/spark_jobs
      - ./data:/opt/spark/data

  spark-worker:
    build:
      context: .
      dockerfile: ./docker/spark/Dockerfile
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081" # Spark Worker Web UI
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2G
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock_key}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock_secret}
      - DB_WAREHOUSE_HOST=${DB_WAREHOUSE_HOST:-postgres-warehouse}
      - DB_WAREHOUSE_PORT=${DB_WAREHOUSE_PORT:-5432}
      - DB_WAREHOUSE_NAME=${DB_WAREHOUSE_NAME:-ecom_warehouse}
      - DB_WAREHOUSE_USER=${DB_WAREHOUSE_USER:-warehouse_user}
      - DB_WAREHOUSE_PASSWORD=${DB_WAREHOUSE_PASSWORD:-warehouse_password}
    volumes:
      - ./src/spark_jobs:/opt/spark/spark_jobs
      - ./data:/opt/spark/data
    depends_on:
      - spark-master

  # ─── APACHE AIRFLOW SYSTEM ──────────────────────────────────────────
  airflow-postgres:
    image: postgres:13-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432" # Uses 5433 to avoid host port conflict with the warehouse
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8082:8080" # Maps to 8082 on the host since Spark Master uses 8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "50000:0" /sources/{logs,dags,plugins}
        /entrypoint airflow db migrate && \
        /entrypoint airflow users create \
          --username admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password admin
    environment:
      <<: *airflow-common-env
    user: "0:0"
    volumes:
      - .:/sources

  # ─── REAL-TIME ORDER PRODUCER ───────────────────────────────────────
  order-producer:
    build:
      context: .
      dockerfile: ./docker/producer/Dockerfile
    container_name: order-producer
    environment:
      # Kafka connection
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:9092
      - KAFKA_TOPIC=${KAFKA_TOPIC:-orders.raw}
      # Producer mode: "test" (100 rows @ 5/sec) or "full" (all rows @ 200/sec)
      - PRODUCER_MODE=${PRODUCER_MODE:-test}
      # AWS credentials — forwarded from .env to read raw data from S3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    volumes:
      - ./src/producers:/app/producers
      - ./src/utils:/app/utils
    depends_on:
      kafka-broker:
        condition: service_started

volumes:
  postgres-warehouse-data:
  kafka-data:
  airflow-postgres-data:
